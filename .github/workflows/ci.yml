name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # The mlang build does not compile packages/mango, so the (separate,
        # independently-CI'd) submodule is intentionally not fetched here.
        with:
          submodules: false

      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest

      - name: Configure (no LLVM backend)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DMLANG_BUILD_TOOLS=ON
          -DMLANG_BUILD_RUNTIME=ON
          -DMLANG_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Smoke-test the compiler on the examples
        shell: bash
        run: |
          set -e
          for f in examples/*.m; do
            echo "== parsing $f =="
            ./build/bin/mlangc --emit=ast "$f" > /dev/null
          done

      - name: Formatter check on the examples
        shell: bash
        run: |
          set -e
          for f in examples/*.m; do
            ./build/bin/mfmt --check "$f"
          done

  clang-format:
    name: clang-format (advisory)
    runs-on: ubuntu-latest
    # Advisory: reports C++ style drift in the logs without blocking, until a
    # formatting baseline is committed. Make it gating by adding --Werror.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Report C++ formatting drift
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find compiler runtime tools -type f \( -name '*.cpp' -o -name '*.hpp' \) \
            | xargs clang-format --dry-run || true
